name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:

# One run per ref; cancel a run that a newer push supersedes.
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + test both apps on every push and PR. Dependency caches (pip / npm)
  # keyed by the lockfiles keep re-runs fast.
  lint-and-test:
    name: Lint & test (backend + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Backend: ruff + black + pytest --------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check .

      - name: Format check (black)
        working-directory: backend
        run: black --check .

      - name: Tests (pytest)
        working-directory: backend
        run: pytest

      # --- Frontend: eslint + prettier + vitest + build ------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: frontend
        run: npm run lint

      - name: Format check (Prettier)
        working-directory: frontend
        run: npm run format:check

      - name: Tests (Vitest)
        working-directory: frontend
        run: npm run test

      - name: Build (type-check + bundle)
        working-directory: frontend
        run: npm run build

  # Build and push the production images to GHCR, but only when code actually
  # lands on main. PRs and feature branches stop at lint-and-test.
  build-and-push:
    name: Build & push image (${{ matrix.image }})
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: backend
            context: ./backend
          - image: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/rag-${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Incremental builds via the GitHub Actions layer cache, scoped per
          # image so the backend and frontend caches never collide.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
