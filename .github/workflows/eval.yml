name: RAGAS evaluation

# Manual-only: the evaluation calls the Anthropic API (generation) and the
# OpenAI API (RAGAS judge + embeddings), so it is not run on every push. Trigger
# it from the Actions tab. Requires the repository secrets OPENAI_API_KEY and
# ANTHROPIC_API_KEY.
on:
  workflow_dispatch:

jobs:
  evaluate:
    name: Run RAGAS over the fixtures
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RAG_API_BASE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: eval/requirements.txt

      - name: Install eval dependencies
        run: pip install -r eval/requirements.txt

      - name: Start the stack
        # docker-compose reads OPENAI_API_KEY / ANTHROPIC_API_KEY from the env
        # (set at job level) to interpolate the backend service variables.
        # --wait blocks until the backend healthcheck passes.
        run: docker compose -f infra/docker-compose.yml up --build -d --wait --wait-timeout 360

      - name: Index the test fixtures
        run: python eval/index_fixtures.py

      - name: Run the RAGAS evaluation
        run: python eval/run_ragas.py

      - name: Upload evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ragas-report
          path: |
            eval/results/report.md
            eval/results/report.json
          if-no-files-found: warn

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs backend

      - name: Tear down the stack
        if: always()
        run: docker compose -f infra/docker-compose.yml down -v
