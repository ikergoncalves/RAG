# Production stack for RAG.
#
# Differences from the development compose (docker-compose.yml):
#   - Images are pulled from the GitHub Container Registry by default (built and
#     pushed by .github/workflows/cicd.yml); a `build` block is kept so the file
#     can also build locally for a prod-like smoke test.
#   - No development bind mounts; only the named volumes that hold real data.
#   - Every service has `restart: unless-stopped` and an explicit healthcheck.
#   - All configuration comes from the environment with NO inline defaults for
#     credentials/secrets (`${VAR:?...}` fails fast when one is missing).
#   - Only the frontend (:80) and the backend (:8000, for debugging) publish
#     host ports; the datastores and Langfuse stay on the internal network.
#
# Run it with an explicit env file:
#   cp .env.prod.example .env.prod   # then fill in the secrets
#   docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d
name: rag-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    # The Qdrant image has no curl/wget, but it does ship bash, so readiness is
    # probed by opening a TCP connection to the REST port via /dev/tcp.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Persist the cache across restarts (append-only file).
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Dedicated Postgres for Langfuse, isolated from the application database.
  langfuse-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:?LANGFUSE_DB_PASSWORD is required}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Langfuse (LLM tracing), internal-only — not published to the host. The
  # backend reaches it over the compose network at http://langfuse:3000.
  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:?LANGFUSE_DB_PASSWORD is required}@langfuse-db:5432/langfuse
      NEXTAUTH_URL: ${LANGFUSE_HOST:-http://langfuse:3000}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?LANGFUSE_NEXTAUTH_SECRET is required}
      SALT: ${LANGFUSE_SALT:?LANGFUSE_SALT is required}
      # 256-bit key as 64 hex characters.
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?LANGFUSE_ENCRYPTION_KEY is required}
      TELEMETRY_ENABLED: "false"
      # Bootstrap a project + API keys headlessly so the backend can trace.
      LANGFUSE_INIT_ORG_ID: rag
      LANGFUSE_INIT_ORG_NAME: RAG
      LANGFUSE_INIT_PROJECT_ID: rag
      LANGFUSE_INIT_PROJECT_NAME: RAG
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:?LANGFUSE_PUBLIC_KEY is required}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:?LANGFUSE_SECRET_KEY is required}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_USER_EMAIL:?LANGFUSE_USER_EMAIL is required}
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_USER_PASSWORD:?LANGFUSE_USER_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/ikergoncalves/rag-backend:latest}
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Apply database migrations before starting the API server.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      # Optional: the bundled Qdrant needs no auth; set when using a managed one.
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Optional Redis auth (managed Redis); blank by default for the bundled
      # no-auth Redis on the internal network.
      REDIS_USER: ${REDIS_USER:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      UPLOAD_DIR: /app/var/uploads
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY is required}
      # Optional: re-ranking degrades to a no-op when unset, so this does not
      # block startup (unlike the required credentials above).
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:?LANGFUSE_PUBLIC_KEY is required}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:?LANGFUSE_SECRET_KEY is required}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
    volumes:
      - backend_uploads:/app/var/uploads
    # Published only so the API/docs can be inspected directly while debugging.
    # Remove this block for a locked-down deployment (the frontend proxies /api).
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      langfuse:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 12
      # The cross-encoder model downloads/loads on first start; give it room.
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/ikergoncalves/rag-frontend:latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Host :80 -> nginx :8080 (non-root nginx-unprivileged image).
    ports:
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    # 127.0.0.1, not localhost: nginx listens on IPv4 only (the unprivileged
    # image cannot add the IPv6 listen to our read-only config), and busybox
    # wget resolves localhost to ::1 without falling back to IPv4.
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  backend_uploads:
  langfuse_db_data:
