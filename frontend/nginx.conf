server {
    # 8080, not 80: the nginx-unprivileged base image runs as a non-root user
    # that cannot bind privileged ports. Compose maps the host port to this.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API/health calls to the backend service so the browser uses
    # same-origin requests (no CORS, no hard-coded backend URL).
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # App API. The frontend calls `/api/*`; the prefix is stripped here (the
    # trailing slash on proxy_pass maps `/api/documents` -> `/documents`) so the
    # API paths never shadow the SPA's client-side routes (e.g. `/documents`).
    # `/api/chat` streams Server-Sent Events, so response buffering is disabled.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
